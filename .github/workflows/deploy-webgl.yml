name: Build and deploy WebGL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-WebGL-

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Build project
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: auto
          buildsPath: build

      - name: Fix build permissions
        run: |
          if [ -d build ]; then sudo chown -R "$USER:$USER" build; fi

      - name: Prepare for GitHub Pages
        env:
          BASE: /${{ github.event.repository.name }}
        run: |
          python3 <<'PY'
          import os
          import re
          import shutil
          from pathlib import Path

          base = os.environ["BASE"]
          roots = [Path("build/WebGL"), Path("build"), Path("Build/WebGL"), Path("Build")]
          platform_dir = next((p for p in roots if p.is_dir()), None)
          if platform_dir is None:
              print("No build output directory found. Tree:")
              for root in ("build", "Build"):
                  p = Path(root)
                  if p.exists():
                      for path in sorted(p.rglob("*"))[:80]:
                          print(path)
              raise SystemExit(1)

          candidates = list(platform_dir.rglob("index.html"))
          if not candidates:
              print(f"No index.html under {platform_dir}. Tree:")
              for path in sorted(platform_dir.rglob("*"))[:80]:
                  print(path)
              raise SystemExit(1)

          index = min(candidates, key=lambda p: len(p.parts))
          deploy_dir = index.parent

          staging = Path("pages")
          if staging.exists():
              shutil.rmtree(staging)
          shutil.copytree(deploy_dir, staging)

          index = staging / "index.html"
          text = index.read_text(encoding="utf-8")

          def with_base(value: str) -> str:
              if value.startswith(base):
                  return value
              return f"{base}/{value}"

          text = re.sub(
              r'var buildUrl = "([^"]+)"',
              lambda m: f'var buildUrl = "{with_base(m.group(1))}"',
              text,
          )
          text = re.sub(
              r'(buildUrl:\s*")([^"]+)"',
              lambda m: f'{m.group(1)}{with_base(m.group(2))}"',
              text,
          )
          text = re.sub(
              r'(streamingAssetsUrl:\s*")([^"]+)"',
              lambda m: f'{m.group(1)}{with_base(m.group(2))}"',
              text,
          )
          index.write_text(text, encoding="utf-8")
          (staging / ".nojekyll").touch()
          print(f"Prepared {deploy_dir} -> {staging}")
          PY

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          publish_branch: gh-pages
