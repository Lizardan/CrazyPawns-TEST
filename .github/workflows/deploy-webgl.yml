name: Build and deploy WebGL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-WebGL-

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Build project
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: auto
          buildsPath: build

      - name: Prepare for GitHub Pages
        env:
          BASE: /${{ github.event.repository.name }}
        run: |
          python3 <<'PY'
          import os
          import re
          import shutil
          from pathlib import Path

          base = os.environ["BASE"]
          platform_dir = Path("build/WebGL")
          if not platform_dir.is_dir():
              raise SystemExit(f"Build output not found: {platform_dir}")

          index = platform_dir / "index.html"
          if not index.is_file():
              nested = platform_dir / "WebGL" / "index.html"
              if nested.is_file():
                  index = nested
              else:
                  candidates = list(platform_dir.rglob("index.html"))
                  if not candidates:
                      raise SystemExit(f"No index.html under {platform_dir}")
                  index = min(candidates, key=lambda p: len(p.parts))

          deploy_dir = index.parent
          text = index.read_text(encoding="utf-8")
          text = re.sub(r'(buildUrl:\s*")([^"]+)"', rf'\1{base}/\2"', text)
          text = re.sub(r'(streamingAssetsUrl:\s*")([^"]+)"', rf'\1{base}/\2"', text)
          index.write_text(text, encoding="utf-8")
          (deploy_dir / ".nojekyll").touch()

          staging = Path("pages")
          if staging.exists():
              shutil.rmtree(staging)
          shutil.copytree(deploy_dir, staging)
          print(f"Prepared {deploy_dir} -> {staging}")
          PY

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          publish_branch: gh-pages
