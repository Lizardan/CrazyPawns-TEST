name: Build and deploy WebGL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v6
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-WebGL-

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Build project
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: auto

      - name: Prepare for GitHub Pages
        env:
          BASE: /${{ github.event.repository.name }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          base = os.environ["BASE"]
          build_dir = Path("build/WebGL")
          index = build_dir / "index.html"
          text = index.read_text(encoding="utf-8")
          text = re.sub(r'(buildUrl:\s*")([^"]+)"', rf'\1{base}/\2"', text)
          text = re.sub(r'(streamingAssetsUrl:\s*")([^"]+)"', rf'\1{base}/\2"', text)
          index.write_text(text, encoding="utf-8")
          (build_dir / ".nojekyll").touch()
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/WebGL

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
